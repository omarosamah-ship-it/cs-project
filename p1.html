<html>
<head>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #f0f4f8;
      color: #1a1a2e;
    }
    fieldset {
      background-color: #ffffff;
      border: 2px solid #4a90c4;
      border-radius: 20px;
      width: 220px;
      padding: 20px;
    }
    h2 {
      color: #1a3a5c;
      border-bottom: 2px solid #4a90c4;
      padding-bottom: 5px;
      font-size: 16px;
    }
    #sss, #mmm {
      color: #1a1a2e;
      background-color: #e8f0f8;
      width: 180px;
      border: 1px solid #4a90c4;
      border-radius: 6px;
      padding: 4px;
    }
    .log {
      color: white;
      background-color: #1a3a5c;
      width: 120px;
      height: 30px;
      border: none;
      border-radius: 10px;
    }
    label { color: #1a3a5c; }
  </style>
  <title>form of login</title>
</head>
<body>

<fieldset>
  <form action="p2.html" method="get">
    <div>
      <label for="sss"><h2>user name</h2></label>
      <input type="text" id="sss" placeholder="اسم المستخدم" required>
    </div>
    <div>
      <label for="mmm"><h2>password</h2></label>
      <input type="password" id="mmm" placeholder="كلمه المرور" required>
    </div>
    <div required=>
      <input type="radio" name="role" value="student" id="dd">
      <label for="dd">student</label>
      <input type="radio" name="role" id="ddd" value="teacher">
      <label for="ddd">teacher</label>
    </div>
    <div>
      <input type="checkbox" id="ch" required>
      <label for="ch">agree on terms of service</label>
    </div>
    <br>
    <div>
      <input type="submit" value="Log in" class="log">
    </div>
  </form>
</fieldset>

</body>
</html>
